<!doctype html>
<html lang="en">
    <head>
        <title>Nutrition MCP — Sign In</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta charset="utf-8" />
        <link rel="icon" href="/favicon.ico" />
        <meta name="theme-color" content="#4a7c59" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Inter+Tight:wght@700;800&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/css/all.min.css"
        />
        <link rel="stylesheet" href="/styles.css" />
        <script
            async
            src="https://www.googletagmanager.com/gtag/js?id=G-1K4HRB2R8X"
        ></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag() {
                dataLayer.push(arguments);
            }
            gtag("js", new Date());
            gtag("config", "G-1K4HRB2R8X");
        </script>
    </head>
    <body class="auth">
        <script>
            // Apply a saved theme override before paint to avoid a flash.
            // With no saved preference, the OS setting drives it via CSS.
            (function () {
                try {
                    var t = localStorage.getItem("theme");
                    if (t === "dark" || t === "light")
                        document.body.setAttribute("data-theme", t);
                } catch (e) {}
            })();
        </script>

        <button
            class="auth-toggle"
            type="button"
            id="theme-toggle"
            aria-label="Toggle dark mode"
            title="Toggle dark mode"
        ></button>

        <main class="auth-wrap">
            <div class="auth-card">
                <div class="auth-head">
                    <span class="auth-mark" aria-hidden="true">🍏</span>
                    <h1 class="auth-title">Nutrition MCP</h1>
                    <p class="auth-sub">Sign in to connect</p>
                </div>

                {{ERROR}}

                <a
                    class="auth-btn auth-btn-google"
                    href="/authorize/google?session_id={{SESSION_ID}}"
                >
                    <i
                        class="fa-brands fa-google auth-btn-google-icon"
                        aria-hidden="true"
                    ></i>
                    Continue with Google
                </a>

                <div class="auth-divider"><span>or use email</span></div>

                <form method="POST" action="/approve" class="auth-form">
                    <input
                        type="hidden"
                        name="session_id"
                        value="{{SESSION_ID}}"
                    />
                    <div class="auth-field">
                        <label for="email">Email</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            required
                            autocomplete="email"
                        />
                    </div>
                    <div class="auth-field">
                        <label for="password">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                            minlength="6"
                            autocomplete="current-password"
                        />
                    </div>
                    <button
                        type="submit"
                        name="action"
                        value="login"
                        class="auth-btn auth-btn-secondary"
                    >
                        Continue
                    </button>
                    <p class="auth-note">
                        New here? Just enter your email and password — an
                        account will be created automatically.
                    </p>
                    <p class="auth-note">
                        After successful connection in your client, save your
                        password somewhere and close this browser tab.
                    </p>
                </form>
            </div>
        </main>

        <script>
            (function () {
                var btn = document.getElementById("theme-toggle");
                if (!btn) return;
                var meta = document.querySelector('meta[name="theme-color"]');
                var darkQuery = window.matchMedia(
                    "(prefers-color-scheme: dark)",
                );
                var MOON =
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
                var SUN =
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>';
                // Effective theme = explicit override, else the OS setting.
                function effectiveTheme() {
                    var override = document.body.getAttribute("data-theme");
                    if (override) return override;
                    return darkQuery.matches ? "dark" : "light";
                }
                function syncUI() {
                    var dark = effectiveTheme() === "dark";
                    btn.innerHTML = dark ? SUN : MOON;
                    var label = dark
                        ? "Switch to light mode"
                        : "Switch to dark mode";
                    btn.setAttribute("aria-label", label);
                    btn.setAttribute("title", label);
                    if (meta)
                        meta.setAttribute(
                            "content",
                            dark ? "#161617" : "#4a7c59",
                        );
                }
                btn.addEventListener("click", function () {
                    var next = effectiveTheme() === "dark" ? "light" : "dark";
                    document.body.setAttribute("data-theme", next);
                    try {
                        localStorage.setItem("theme", next);
                    } catch (e) {}
                    syncUI();
                });
                // While following the OS (no override), track system changes.
                darkQuery.addEventListener("change", function () {
                    if (!document.body.getAttribute("data-theme")) syncUI();
                });
                syncUI();
            })();
        </script>
    </body>
</html>
